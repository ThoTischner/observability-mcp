name: Publish Docker image to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build per architecture in parallel on native runners. arm64 builds on
  # GitHub's free ubuntu-24.04-arm runners instead of being emulated via
  # QEMU on x86, which previously hung sporadically and tripped the 6h
  # workflow timeout.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lowercase image name
        id: image
        run: echo "lower=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute platform pair
        id: platform
        run: echo "pair=$(echo ${{ matrix.platform }} | tr / -)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}

      # Build + push, with up to 3 attempts. GHCR returns transient 5xx
      # on layer-blob writes often enough that a single failed push
      # would redden an otherwise-good release. The build itself is
      # cached (type=gha) so retries only re-push, they don't rebuild.
      # Three explicit attempt steps instead of a third-party retry
      # wrapper — keeps the supply chain auditable for a signed/SBOM
      # image. attempts 1+2 are continue-on-error; attempt 3 is the
      # one that can fail the job.
      - name: Build and push by digest (attempt 1)
        id: build1
        continue-on-error: true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./mcp-server
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          # Supply-chain attestations: SBOM (CycloneDX via buildx) and
          # SLSA provenance, both attached as OCI image attestations.
          # `docker buildx imagetools inspect ... --format '{{json .SBOM}}'`
          # surfaces the SBOM; cosign verifies the provenance.
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}

      - name: Backoff before attempt 2
        if: steps.build1.outcome == 'failure'
        run: sleep 20

      - name: Build and push by digest (attempt 2)
        id: build2
        if: steps.build1.outcome == 'failure'
        continue-on-error: true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./mcp-server
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}

      - name: Backoff before attempt 3
        if: steps.build1.outcome == 'failure' && steps.build2.outcome == 'failure'
        run: sleep 45

      - name: Build and push by digest (attempt 3)
        id: build3
        if: steps.build1.outcome == 'failure' && steps.build2.outcome == 'failure'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./mcp-server
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}

      - name: Resolve digest
        id: build
        run: |
          d="${{ steps.build1.outputs.digest || steps.build2.outputs.digest || steps.build3.outputs.digest }}"
          [ -n "$d" ] || { echo "no digest from any build attempt"; exit 1; }
          echo "digest=$d" >> "$GITHUB_OUTPUT"
          echo "resolved digest: $d"

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single multi-arch manifest list
  # with the user-facing tags (latest, X.Y.Z, X.Y, X, sha-...).
  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      # Keyless cosign sign + SBOM attach: id-token allows OIDC
      # exchange with sigstore's Fulcio for a short-lived signing
      # cert. Cosign OCI attestations push to the same registry
      # repo as the image (covered by packages: write above) — no
      # separate `attestations: write` needed (that's for GitHub's
      # native attest-* action family, which we don't use here).
      id-token: write
    steps:
      - name: Lowercase image name
        id: image
        run: echo "lower=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}@sha256:%s ' *)

      - name: Inspect image
        id: inspect
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}:${{ steps.meta.outputs.version }}
          DIGEST="$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}:${{ steps.meta.outputs.version }} --format '{{.Manifest.Digest}}')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # ---- Phase E9: keyless cosign signing ----
      # Sigstore OIDC + Fulcio: no key management. The signature is
      # pushed to the OCI registry alongside the manifest digest;
      # `cosign verify` (with the workflow identity + Fulcio root)
      # is enough for downstream operators to confirm provenance.
      - name: Install cosign
        # Pin hash + label corrected by reviewer: this SHA is the
        # sigstore/cosign-installer v3.9.2 release. We let the
        # action's default cosign version (currently v2.5.3) ride
        # rather than pinning a downgrade — keyless behaviour is
        # default since cosign 2.x, no operator-visible change.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the image (keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}@${{ steps.inspect.outputs.digest }}"

      # ---- Phase E9: Syft SBOM (CycloneDX + SPDX) + cosign attach ----
      # The buildx-side SBOM is OCI-attached; this extra Syft pass
      # produces standalone CycloneDX-JSON + SPDX-JSON files the
      # release uploads (and cosign attests against the image
      # digest with type=cyclonedx) so an air-gapped operator can
      # download + verify the SBOM without pulling the image.
      - name: Install Syft
        # Pin label corrected by reviewer: this SHA is the
        # anchore/sbom-action v0.20.4 release.
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Generate SBOMs (Syft)
        # Note: Syft handed a manifest-list digest defaults to the
        # host runner's platform (linux/amd64 on GitHub-hosted
        # runners). The arm64 variant of the image is covered by
        # the buildx-embedded SBOM only; doing a second per-platform
        # Syft pass is tracked as an E9 follow-up.
        run: |
          syft "${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}@${{ steps.inspect.outputs.digest }}" \
            -o cyclonedx-json=image-sbom.cdx.json \
            -o spdx-json=image-sbom.spdx.json
      - name: Attest SBOM to the image (cosign attestation)
        run: |
          cosign attest --yes --predicate image-sbom.cdx.json --type cyclonedx \
            "${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}@${{ steps.inspect.outputs.digest }}"
          cosign attest --yes --predicate image-sbom.spdx.json --type spdxjson \
            "${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}@${{ steps.inspect.outputs.digest }}"
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: image-sbom-${{ steps.meta.outputs.version }}
          path: |
            image-sbom.cdx.json
            image-sbom.spdx.json
          if-no-files-found: error
          retention-days: 90

name: Integration smoke test

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build & start the full stack
        # The demo profile pulls in Prometheus, Loki, example services
        # and the agent so the MCP tool calls have something to talk to.
        # Operators in production typically `docker compose up mcp-server`
        # and point at their own backends.
        run: docker compose --profile demo up -d --build --wait --wait-timeout 300

      - name: List running services
        if: always()
        run: docker compose ps

      - name: Wait for MCP server /api/sources to report all connected
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            body=$(curl -fsS http://localhost:3000/api/sources || true)
            if [ -n "$body" ] && [ "$(echo "$body" | jq 'type')" = '"array"' ]; then
              echo "$body" | jq '[.[] | {name, type, status}]'
              total=$(echo "$body" | jq 'length')
              ok=$(echo "$body" | jq '[.[] | select(.status == "up")] | length')
              if [ "$total" -gt 0 ] && [ "$total" = "$ok" ]; then
                echo "all $total sources connected"
                exit 0
              fi
            fi
            sleep 5
          done
          echo "MCP server did not become healthy in time"
          curl -s http://localhost:3000/api/sources | jq . || true
          exit 1

      - name: Probe aggregated /api/health (service health map)
        run: |
          set -euo pipefail
          body=$(curl -fsS http://localhost:3000/api/health)
          echo "$body" | jq 'keys'
          # at least one service should be discovered
          n=$(echo "$body" | jq 'keys | length')
          [ "$n" -gt 0 ] || (echo "no services discovered"; exit 1)

      - name: Probe Prometheus
        run: curl -fsS 'http://localhost:9090/-/ready'

      - name: Probe Loki
        run: curl -fsS 'http://localhost:3100/ready' | head -5

      - name: Probe example services
        run: |
          for port in 8080 8081 8082; do
            echo "--- port $port ---"
            curl -fsS "http://localhost:${port}/health"
          done

      - name: MCP Streamable HTTP — initialize, list tools, list resources
        run: |
          set -euo pipefail
          # MCP Streamable HTTP transport: initialize returns Mcp-Session-Id
          # header which must be replayed on subsequent calls. Responses are
          # SSE-framed (lines prefixed with "data: ").
          hdr=/tmp/mcp-hdr
          body=/tmp/mcp-body

          curl -sS -D "$hdr" -o "$body" -X POST http://localhost:3000/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}'
          echo "--- init headers ---"; cat "$hdr"
          echo "--- init body ---";    cat "$body"

          sid=$(grep -i '^mcp-session-id:' "$hdr" | awk '{print $2}' | tr -d '\r\n')
          [ -n "$sid" ] || (echo "no mcp-session-id returned"; exit 1)
          grep -q '"serverInfo"' "$body" || (echo "initialize did not return serverInfo"; exit 1)

          # Required follow-up per spec
          curl -fsS -X POST http://localhost:3000/mcp \
            -H "Mcp-Session-Id: $sid" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' >/dev/null || true

          curl -fsS -X POST http://localhost:3000/mcp \
            -H "Mcp-Session-Id: $sid" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' -o "$body"
          echo "--- tools/list ---"; cat "$body"
          for t in list_sources list_services query_metrics query_logs get_service_health detect_anomalies get_topology get_blast_radius; do
            grep -q "\"$t\"" "$body" || (echo "missing tool: $t"; exit 1)
          done
          echo "all 8 tools advertised"

      - name: Trigger a chaos mode and verify it sticks
        run: |
          set -euo pipefail
          curl -fsS -X POST http://localhost:8081/chaos/error-spike
          sleep 3
          curl -fsS http://localhost:8081/health | head -5
          curl -fsS -X POST http://localhost:8081/chaos/reset

      - name: Real E2E — OMCP_KEY_PRODUCTS filters /mcp tools/list
        # End-to-end proof that a credential bound to an MCP Product
        # sees ONLY the Product's tools allow-list — not the full 8.
        # Boots a second mcp-server container (same image, port 3002)
        # with OMCP_API_KEYS + OMCP_KEY_PRODUCTS + a mounted
        # products.yaml fixture, then does a real MCP handshake with
        # the bound bearer token and asserts the tools/list payload.
        # No mocks. Touches every layer: env parsing → credential
        # binding → tenant resolution → ctx.allowedTools →
        # registerTool() filter → tools/list response.
        run: |
          set -euo pipefail
          mkdir -p /tmp/products-fixture
          cat > /tmp/products-fixture/products.yaml <<'EOF'
          products:
            - id: ci-ops
              name: CI Ops Bundle
              status: published
              tools:
                - list_sources
                - query_metrics
          EOF

          # Start a one-off test container sharing the demo network.
          # `docker compose run` reuses the project image + network so
          # the test instance can reach Prometheus / Loki by service
          # name like the real one does. -d keeps it backgrounded.
          docker compose run -d --rm --name mcp-test \
            -e PORT=3000 \
            -e OMCP_API_KEYS=ci:tok_e2e_secret \
            -e OMCP_KEY_PRODUCTS=ci=ci-ops \
            -e OMCP_PRODUCTS_FILE=/fixture/products.yaml \
            -v /tmp/products-fixture:/fixture:ro \
            -p 3002:3000 \
            --no-deps \
            mcp-server

          # Wait for the test instance.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3002/api/sources >/dev/null 2>&1; then
              echo "test instance ready"
              break
            fi
            sleep 1
          done

          # MCP handshake with bearer.
          hdr=/tmp/init.h
          body=/tmp/init.body
          curl -fsS -X POST http://localhost:3002/mcp \
            -H "Authorization: Bearer tok_e2e_secret" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -D "$hdr" -o "$body" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-product-binding","version":"1.0"}}}'
          sid=$(grep -i '^mcp-session-id:' "$hdr" | awk '{print $2}' | tr -d '\r\n')
          [ -n "$sid" ] || { echo "no mcp-session-id"; exit 1; }
          curl -fsS -X POST http://localhost:3002/mcp \
            -H "Mcp-Session-Id: $sid" \
            -H "Authorization: Bearer tok_e2e_secret" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' >/dev/null || true

          # tools/list — must return EXACTLY the Product's two tools.
          tools_body=/tmp/tools.body
          curl -fsS -X POST http://localhost:3002/mcp \
            -H "Mcp-Session-Id: $sid" \
            -H "Authorization: Bearer tok_e2e_secret" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' -o "$tools_body"
          echo "--- bound tools/list (raw, may be SSE-framed) ---"; cat "$tools_body"

          # The /mcp Streamable HTTP transport returns SSE-framed JSON
          # when Accept includes text/event-stream. Strip the
          # `data: ` envelope before jq.
          json=$(grep -E '^(data: )?\{' "$tools_body" | head -1 | sed -E 's/^data: //')
          names=$(echo "$json" | jq -r '.result.tools[].name' | sort | tr '\n' ' ' | sed 's/ $//')
          expected='list_sources query_metrics'
          if [ "$names" != "$expected" ]; then
            echo "FAIL: tools/list did not match the bound Product."
            echo "  expected: $expected"
            echo "  got:      $names"
            exit 1
          fi

          # Negative control: a registered tool that is NOT in the
          # Product's allow-list (e.g. get_topology) must NOT appear.
          if echo "$names" | tr ' ' '\n' | grep -qx "get_topology"; then
            echo "FAIL: tools/list leaked a tool NOT in the Product's allow-list"
            exit 1
          fi

          echo "OK: real E2E — Product binding filtered tools/list to exactly the bound subset"

      - name: Cleanup product-binding test instance
        if: always()
        run: docker rm -f mcp-test 2>/dev/null || true

      - name: MCP 2025-11-25 conformance harness
        # Proves every release upholds the wire contract for the
        # supported spec revision. Adding a new revision = add a new
        # harness file + bump /api/conformance. See
        # docs/mcp-conformance.md.
        run: |
          docker run --rm \
            -w /app -v "$PWD/mcp-server:/app" \
            --network=host \
            -e OMCP_CONFORMANCE_URL=http://localhost:3000/mcp \
            node:20-alpine sh -c \
            "npx --yes tsx --test src/conformance/mcp-2025-11-25.test.ts"

      - name: /api/conformance probe
        run: |
          body=$(curl -fsS http://localhost:3000/api/conformance)
          echo "$body" | jq .
          echo "$body" | jq -e '.revisions | index("2025-11-25")' > /dev/null

      - name: Inspect observe-path E2E
        # Proves a real tools/call over the transport is captured by the
        # observe recorder and surfaces on /api/inspect/events + /flows.
        run: |
          docker run --rm \
            -w /app -v "$PWD/mcp-server:/app" \
            --network=host \
            -e OMCP_CONFORMANCE_URL=http://localhost:3000/mcp \
            node:20-alpine sh -c \
            "npx --yes tsx --test src/conformance/inspect-e2e.test.ts"

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs --no-color --tail=200 mcp-server || true
          docker compose logs --no-color --tail=100 agent || true
          docker compose logs --no-color --tail=50 prometheus loki || true

      - name: Tear down
        if: always()
        run: docker compose --profile demo down -v

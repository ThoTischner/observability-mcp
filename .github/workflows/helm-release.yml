name: Publish Helm chart

# Publishes the chart at helm/observability-mcp/ to a gh-pages branch
# (Helm chart-releaser convention). Operators can then:
#   helm repo add observability-mcp https://thotischner.github.io/observability-mcp
#   helm install obs ./observability-mcp/observability-mcp
#
# Triggered on:
#   - any push to main that touches the chart (so a Chart.yaml version
#     bump publishes immediately — chart releases are decoupled from
#     app releases), or
#   - any v* tag push (an app release also refreshes the chart's
#     appVersion), or
#   - manually.
# chart-releaser runs with skip_existing, so re-running with an
# unchanged chart version is a harmless no-op. ArtifactHub picks up the
# index via the gh-pages URL.

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - '.github/workflows/helm-release.yml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      # Required for the OCI publish step: helm push goes to ghcr.io,
      # cosign keyless attest pushes the signature into the same OCI
      # registry alongside the chart artifact.
      packages: write
      # Keyless cosign needs OIDC to exchange a short-lived token with
      # Sigstore Fulcio — same pattern as docker-publish.yml.
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.14.0

      # Signing is best-effort: a problem here must NEVER block the chart
      # from publishing (publishing the chart is essential; the "signed"
      # badge is a bonus). continue-on-error + an explicit sign output
      # that the chart-releaser step keys off of.
      - name: Import GPG signing key
        id: gpg
        continue-on-error: true
        env:
          KEY_B64: ${{ secrets.HELM_SIGNING_KEY_B64 }}
          PASSPHRASE: ${{ secrets.HELM_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -uo pipefail
          # chart-releaser-action does NOT accept sign/key/keyring as
          # action inputs (they're silently ignored). The underlying `cr`
          # tool only reads them from a config file passed via the
          # action's `config:` input. So we always emit /tmp/cr.yaml:
          # signed config on success, an empty (no-op) config otherwise,
          # so the `config:` reference is always valid.
          unsigned() {
            echo "::warning::$1 — publishing unsigned."
            echo "sign: false" > /tmp/cr.yaml
            echo "sign=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          [ -n "${KEY_B64:-}" ] || unsigned "HELM_SIGNING_KEY_B64 unset"
          # GnuPG 2.1+ dropped the legacy secring.gpg format, so import
          # into the real keyring first, then re-export a binary secret
          # keyring that the cr/Helm openpgp signer can read.
          # gpg stderr goes to a temp file, NOT into the ::warning:: — the
          # Actions log is public and import errors can echo back fragments
          # of the (masked, but still) key material. Keep the public message
          # generic; the detail is wiped with the rest of the signing
          # material in the final step.
          echo "$KEY_B64" | base64 -d | gpg --batch --import 2>/tmp/gpgerr \
            || unsigned "GPG import failed (details withheld from public log)"
          fpr=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          uid=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid:/{print $10; exit}')
          [ -n "$fpr" ] && [ -n "$uid" ] || unsigned "could not resolve imported key"
          gpg --export-secret-keys "$fpr" > /tmp/secring.gpg
          echo "${PASSPHRASE:-}" > /tmp/helm-passphrase
          # cr config — keys mirror the cr flag names. printf (not a
          # heredoc) so YAML block indentation can't leak into the file.
          printf 'sign: true\nkey: "%s"\nkeyring: "/tmp/secring.gpg"\npgp-passphrase-file: "/tmp/helm-passphrase"\n' "$uid" > /tmp/cr.yaml
          echo "sign=true"    >> "$GITHUB_OUTPUT"
          echo "key_fpr=$fpr" >> "$GITHUB_OUTPUT"
          echo "imported signing key: $fpr ($uid)"

      - name: Lint chart
        run: helm lint helm/observability-mcp

      - name: Template chart (smoke)
        run: |
          helm template smoke helm/observability-mcp \
            --set sources.prometheusUrl=http://prometheus:9090 \
            --set ingress.enabled=true \
            --set auth.enabled=true \
            --set auth.token=test \
            --set persistence.enabled=true \
            --set autoscaling.enabled=true > /tmp/rendered.yaml
          wc -l /tmp/rendered.yaml

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: helm
          mark_as_latest: "true"
          skip_existing: "true"
          # Signing config lives in /tmp/cr.yaml (written by the gpg
          # step). chart-releaser-action has no sign/key/keyring inputs —
          # the underlying `cr` only reads them from this config file.
          # When unsigned, the file is `sign: false` (a harmless no-op).
          config: /tmp/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Parallel OCI publish (ghcr.io) + keyless cosign signing.
      # chart-releaser writes the packaged tarball to .cr-release-packages/
      # (one .tgz per chart version it just released). If that directory
      # is empty — e.g. skip_existing skipped the only chart this run —
      # the OCI publish is a no-op so a re-run that publishes nothing
      # new doesn't error out.
      - name: Lowercase OCI repo path
        id: oci
        run: |
          echo "repo=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/charts" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR (helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
      - name: Log in to GHCR (docker config — cosign reads this)
        # cosign signs by pushing the signature artifact next to the
        # chart in the same OCI registry. It reads credentials from
        # ~/.docker/config.json, NOT helm's registry config — so the
        # helm-login above isn't enough on its own. Without this the
        # cosign sign step 401s on the signature blob upload.
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        # Pin matches docker-publish.yml — sigstore/cosign-installer v4.1.2.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Publish chart to OCI + sign with cosign (keyless)
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(.cr-release-packages/*.tgz)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::notice::no chart tarballs in .cr-release-packages — nothing to push to OCI"
            exit 0
          fi
          REPO="${{ steps.oci.outputs.repo }}"
          for tgz in "${pkgs[@]}"; do
            # `helm push` emits "Pushed: <repo>/<name>:<version>" and
            # "Digest: sha256:..." on stdout. We capture both — the
            # digest is what cosign signs (signing the tag would race
            # an unrelated push to the same tag, the digest is stable).
            out="$(helm push "$tgz" "oci://${REPO}" 2>&1 | tee /dev/stderr)"
            ref="$(echo "$out" | awk '/^Pushed:/ {print $2; exit}')"
            digest="$(echo "$out" | awk '/^Digest:/ {print $2; exit}')"
            if [ -z "$ref" ] || [ -z "$digest" ]; then
              echo "could not parse helm push output for $tgz" >&2
              exit 1
            fi
            # Drop the :tag from the ref so we sign by digest, which is
            # the recommended cosign pattern for OCI artifacts.
            repo_only="${ref%:*}"
            echo "signing ${repo_only}@${digest}"
            cosign sign --yes "${repo_only}@${digest}"
          done
      - name: Log out of GHCR
        if: always()
        run: helm registry logout ghcr.io || true

      - name: Wipe signing material
        if: always()
        run: |
          shred -u /tmp/helm-passphrase /tmp/secring.gpg /tmp/gpgerr /tmp/cr.yaml 2>/dev/null || \
            rm -f /tmp/helm-passphrase /tmp/secring.gpg /tmp/gpgerr /tmp/cr.yaml
          rm -rf ~/.gnupg

name: Publish Helm chart

# Publishes the chart at helm/observability-mcp/ to a gh-pages branch
# (Helm chart-releaser convention). Operators can then:
#   helm repo add observability-mcp https://thotischner.github.io/observability-mcp
#   helm install obs ./observability-mcp/observability-mcp
#
# Triggered on:
#   - any push to main that touches the chart (so a Chart.yaml version
#     bump publishes immediately — chart releases are decoupled from
#     app releases), or
#   - any v* tag push (an app release also refreshes the chart's
#     appVersion), or
#   - manually.
# chart-releaser runs with skip_existing, so re-running with an
# unchanged chart version is a harmless no-op. ArtifactHub picks up the
# index via the gh-pages URL.

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - '.github/workflows/helm-release.yml'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      verify_version:
        description: "Verify-only: poll the published index for this chart version, publish nothing. Empty = normal publish run."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Verify-only dispatches exercise the check below without republishing.
    if: ${{ github.event.inputs.verify_version == '' }}
    concurrency:
      # A release commit fires this workflow TWICE: the push to main touches
      # helm/**, and tag-on-release then pushes the v* tag (path filters don't
      # apply to tag pushes). Both runs call `cr index`, which pulls, rewrites
      # and pushes gh-pages/index.yaml; run in parallel, the loser aborts with
      # "Your local changes to index.yaml would be overwritten by merge".
      # Serialized, the second run sees the first one's commit and is a
      # skip_existing no-op.
      #
      # Scoped to THIS job, not the workflow: only `cr index` needs
      # serializing, and the verify-published job below polls for ~18min.
      # A workflow-level group would hold the lock for that whole time,
      # widening the window in which a third run silently cancels the
      # pending one.
      #
      # Deliberately NOT hub-pages.yml's shared `gh-pages-write` group: GitHub
      # holds only one *pending* run per group, so a third queued run silently
      # cancels the pending one. Own group ⇒ at most 2 runs (one active, one
      # pending) ⇒ nothing is ever dropped. Nothing is lost by not sharing:
      # hub-pages only ever stages hub/ + .nojekyll, never index.yaml, so its
      # commits cannot make `cr index`'s merge touch the file cr has dirty.
      group: helm-release-gh-pages
      cancel-in-progress: false
    outputs:
      changed_charts: ${{ steps.cr.outputs.changed_charts }}
      chart_version: ${{ steps.cr.outputs.chart_version }}
    permissions:
      contents: write
      pages: write
      # Dispatching docs.yml (the Pages refresh, last step) needs this.
      actions: write
      # Required for the OCI publish step: helm push goes to ghcr.io,
      # cosign keyless attest pushes the signature into the same OCI
      # registry alongside the chart artifact.
      packages: write
      # Keyless cosign needs OIDC to exchange a short-lived token with
      # Sigstore Fulcio — same pattern as docker-publish.yml.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.14.0

      # Signing is best-effort: a problem here must NEVER block the chart
      # from publishing (publishing the chart is essential; the "signed"
      # badge is a bonus). continue-on-error + an explicit sign output
      # that the chart-releaser step keys off of.
      - name: Import GPG signing key
        id: gpg
        continue-on-error: true
        env:
          KEY_B64: ${{ secrets.HELM_SIGNING_KEY_B64 }}
          PASSPHRASE: ${{ secrets.HELM_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -uo pipefail
          # chart-releaser-action does NOT accept sign/key/keyring as
          # action inputs (they're silently ignored). The underlying `cr`
          # tool only reads them from a config file passed via the
          # action's `config:` input. So we always emit /tmp/cr.yaml:
          # signed config on success, an empty (no-op) config otherwise,
          # so the `config:` reference is always valid.
          unsigned() {
            echo "::warning::$1 — publishing unsigned."
            echo "sign: false" > /tmp/cr.yaml
            echo "sign=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          [ -n "${KEY_B64:-}" ] || unsigned "HELM_SIGNING_KEY_B64 unset"
          # GnuPG 2.1+ dropped the legacy secring.gpg format, so import
          # into the real keyring first, then re-export a binary secret
          # keyring that the cr/Helm openpgp signer can read.
          # gpg stderr goes to a temp file, NOT into the ::warning:: — the
          # Actions log is public and import errors can echo back fragments
          # of the (masked, but still) key material. Keep the public message
          # generic; the detail is wiped with the rest of the signing
          # material in the final step.
          echo "$KEY_B64" | base64 -d | gpg --batch --import 2>/tmp/gpgerr \
            || unsigned "GPG import failed (details withheld from public log)"
          fpr=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          uid=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid:/{print $10; exit}')
          [ -n "$fpr" ] && [ -n "$uid" ] || unsigned "could not resolve imported key"
          gpg --export-secret-keys "$fpr" > /tmp/secring.gpg
          echo "${PASSPHRASE:-}" > /tmp/helm-passphrase
          # cr config — keys mirror the cr flag names. printf (not a
          # heredoc) so YAML block indentation can't leak into the file.
          printf 'sign: true\nkey: "%s"\nkeyring: "/tmp/secring.gpg"\npgp-passphrase-file: "/tmp/helm-passphrase"\n' "$uid" > /tmp/cr.yaml
          echo "sign=true"    >> "$GITHUB_OUTPUT"
          echo "key_fpr=$fpr" >> "$GITHUB_OUTPUT"
          echo "imported signing key: $fpr ($uid)"

      - name: Lint chart
        run: helm lint helm/observability-mcp

      - name: Template chart (smoke)
        run: |
          helm template smoke helm/observability-mcp \
            --set sources.prometheusUrl=http://prometheus:9090 \
            --set ingress.enabled=true \
            --set auth.enabled=true \
            --set auth.token=test \
            --set persistence.enabled=true \
            --set autoscaling.enabled=true > /tmp/rendered.yaml
          wc -l /tmp/rendered.yaml

      - name: Run chart-releaser
        id: cr
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: helm
          mark_as_latest: "true"
          skip_existing: "true"
          # Signing config lives in /tmp/cr.yaml (written by the gpg
          # step). chart-releaser-action has no sign/key/keyring inputs —
          # the underlying `cr` only reads them from this config file.
          # When unsigned, the file is `sign: false` (a harmless no-op).
          config: /tmp/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Parallel OCI publish (ghcr.io) + keyless cosign signing.
      # chart-releaser writes the packaged tarball to .cr-release-packages/
      # (one .tgz per chart version it just released). If that directory
      # is empty — e.g. skip_existing skipped the only chart this run —
      # the OCI publish is a no-op so a re-run that publishes nothing
      # new doesn't error out.
      - name: Lowercase OCI repo path
        id: oci
        run: |
          echo "repo=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/charts" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR (helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
      - name: Log in to GHCR (docker config — cosign reads this)
        # cosign signs by pushing the signature artifact next to the
        # chart in the same OCI registry. It reads credentials from
        # ~/.docker/config.json, NOT helm's registry config — so the
        # helm-login above isn't enough on its own. Without this the
        # cosign sign step 401s on the signature blob upload.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        # Pin matches docker-publish.yml — sigstore/cosign-installer v4.1.2.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Publish chart to OCI + sign with cosign (keyless)
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(.cr-release-packages/*.tgz)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::notice::no chart tarballs in .cr-release-packages — nothing to push to OCI"
            exit 0
          fi
          REPO="${{ steps.oci.outputs.repo }}"
          for tgz in "${pkgs[@]}"; do
            # `helm push` emits "Pushed: <repo>/<name>:<version>" and
            # "Digest: sha256:..." on stdout. We capture both — the
            # digest is what cosign signs (signing the tag would race
            # an unrelated push to the same tag, the digest is stable).
            out="$(helm push "$tgz" "oci://${REPO}" 2>&1 | tee /dev/stderr)"
            ref="$(echo "$out" | awk '/^Pushed:/ {print $2; exit}')"
            digest="$(echo "$out" | awk '/^Digest:/ {print $2; exit}')"
            if [ -z "$ref" ] || [ -z "$digest" ]; then
              echo "could not parse helm push output for $tgz" >&2
              exit 1
            fi
            # Drop the :tag from the ref so we sign by digest, which is
            # the recommended cosign pattern for OCI artifacts.
            repo_only="${ref%:*}"
            echo "signing ${repo_only}@${digest}"
            cosign sign --yes "${repo_only}@${digest}"
          done
      - name: Refresh the Pages site (publish the new chart to the helm repo URL)
        # chart-releaser pushes index.yaml + the .tgz to the gh-pages
        # BRANCH, but Pages no longer serves that branch — it serves the
        # artifact docs.yml builds, which mirrors the gh-pages files in at
        # build time. So a chart is only reachable via
        #   helm repo add observability-mcp https://thotischner.github.io/observability-mcp
        # once docs.yml has run AFTER this workflow. Without this dispatch
        # the published index goes stale until the next unrelated docs
        # change — which is exactly how 2.9.0/2.9.1/2.9.2 ended up on the
        # branch but invisible to `helm repo update`.
        #
        # always(): by the time the OCI publish + cosign steps above run, cr
        # has ALREADY pushed to gh-pages. Letting a flaky Fulcio/GHCR step
        # abort the job before this dispatch would recreate the exact bug
        # this step exists to prevent. Guarded by changed_charts (empty when
        # cr released nothing) so the no-op tag run doesn't rebuild the site.
        # !cancelled() rather than always(): always() is true even on a
        # cancelled run, so an operator aborting a release could not stop
        # the follow-up work. Failure (e.g. flaky Fulcio after cr pushed)
        # still passes, which is the case that matters.
        if: ${{ !cancelled() && steps.cr.outputs.changed_charts != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docs.yml --ref main -R "$GITHUB_REPOSITORY"

      - name: Log out of GHCR
        if: always()
        run: helm registry logout ghcr.io || true

      - name: Wipe signing material
        if: always()
        run: |
          shred -u /tmp/helm-passphrase /tmp/secring.gpg /tmp/gpgerr /tmp/cr.yaml 2>/dev/null || \
            rm -f /tmp/helm-passphrase /tmp/secring.gpg /tmp/gpgerr /tmp/cr.yaml
          rm -rf ~/.gnupg

  # Separate job on purpose: the release job holds GPG signing material on
  # disk until its "Wipe signing material" step, and this check polls for up
  # to 18 minutes. Keeping it here lets the key be shredded immediately
  # instead of lingering for the whole poll.
  verify-published:
    name: Verify the chart is reachable from the helm repo URL
    needs: release
    # always(): cr pushes to gh-pages BEFORE the OCI/cosign steps, so a flaky
    # Fulcio can fail the release job with the chart already published — that
    # is precisely a case worth verifying, not skipping.
    # !cancelled(), not always(): always() stays true on cancellation, so a
    # cancelled release would still burn ~21min polling — and re-cancelling
    # would fight the same condition. A FAILED release still verifies: cr
    # pushes to gh-pages before the OCI/cosign steps that can flake.
    # !cancelled() also lets this run when `release` was SKIPPED, which is
    # exactly the verify-only dispatch path.
    if: ${{ !cancelled() && (github.event.inputs.verify_version != '' || needs.release.outputs.changed_charts != '') }}
    runs-on: ubuntu-latest
    # Safety net above the ~21min the poll can legitimately take.
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Poll the published index until it serves the new chart
        # `gh workflow run docs.yml` in the release job is fire-and-forget, so
        # the dispatch proves nothing on its own. Close the loop against the
        # surface users actually consume: if `helm repo add` cannot see the
        # chart, the release did not land, and CI must be what notices.
        #
        # Deliberately an end-to-end check of the published URL rather than
        # "did docs.yml exit 0" — the failure that shipped 2.9.0/2.9.1/2.9.2
        # into the void was a GREEN pipeline whose artifact never reached the
        # Pages site.
        env:
          # Single scalar: helm/ holds exactly one chart today. If a second
          # chart is ever added to charts_dir, this verifies only one of the
          # N versions released — revisit then.
          CHART_VERSION: ${{ github.event.inputs.verify_version != '' && github.event.inputs.verify_version || needs.release.outputs.chart_version }}
          VERIFY_ONLY: ${{ github.event.inputs.verify_version }}
        run: |
          set -uo pipefail
          url="https://thotischner.github.io/observability-mcp/index.yaml"
          # BUDGET IS LOAD-BEARING — do not shorten below the CDN max-age.
          # Pages serves index.yaml through Fastly with `max-age=600`, and the
          # edge honours NEITHER a `Cache-Control: no-cache` request header NOR
          # a cache-busting query string (verified: `?cb=<random>` still
          # returns x-cache: HIT with an unchanged age). There is no way to
          # force a fresh read, so the only reliable signal is outlasting one
          # full cache generation: 10min max-age + the mkdocs build and Pages
          # deploy ⇒ poll ~18min. A shorter budget does not fail faster, it
          # fails WRONGLY on a release that published perfectly.
          #
          # Give docs.yml time to build and deploy BEFORE the first request.
          # Polling immediately would only pull the pre-release index into the
          # edge cache and then wait out its own 600s TTL.
          if [ -n "${VERIFY_ONLY:-}" ]; then
            echo "verify-only run — nothing was just deployed, polling immediately"
          else
            echo "waiting 3min for the docs.yml build + Pages deploy before polling"
            sleep 180
          fi
          deadline=$(( SECONDS + 1080 ))
          attempt=0
          while [ "$SECONDS" -lt "$deadline" ]; do
            attempt=$(( attempt + 1 ))
            # Fetch to a file, then grep the file — never `curl | grep -q`.
            # A short-circuiting reader can hand the writer an EPIPE, which
            # under `set -o pipefail` would surface as a failed check on a
            # successful match. Not observed on this runner, but the whole
            # failure class is avoidable for free. It also separates "fetch
            # failed" from "published but not served yet".
            if curl -fsSL --max-time 30 "$url" -o /tmp/published-index.yaml 2>/dev/null; then
              if grep -qE "^[[:space:]]+version: ${CHART_VERSION}[[:space:]]*$" /tmp/published-index.yaml; then
                echo "::notice::chart ${CHART_VERSION} is live at ${url}"
                exit 0
              fi
              age="$(curl -sfI --max-time 15 "$url" 2>/dev/null | awk 'tolower($1)=="age:"{print $2}')"
              echo "attempt ${attempt}: ${CHART_VERSION} not served yet (cached response age ${age:-unknown}s) — waiting"
            else
              echo "attempt ${attempt}: could not fetch ${url} — waiting"
            fi
            sleep 20
          done
          echo "::error::Chart ${CHART_VERSION} reached gh-pages but is NOT served at ${url} after ${SECONDS}s of polling, so 'helm repo add' users cannot install it. Check the docs.yml run (it mirrors index.yaml into the Pages artifact). Manual unblock: gh workflow run docs.yml --ref main"
          exit 1

name: Publish Helm chart

# Publishes the chart at helm/observability-mcp/ to a gh-pages branch
# (Helm chart-releaser convention). Operators can then:
#   helm repo add observability-mcp https://thotischner.github.io/observability-mcp
#   helm install obs ./observability-mcp/observability-mcp
#
# Triggered on:
#   - any push to main that touches the chart (so a Chart.yaml version
#     bump publishes immediately — chart releases are decoupled from
#     app releases), or
#   - any v* tag push (an app release also refreshes the chart's
#     appVersion), or
#   - manually.
# chart-releaser runs with skip_existing, so re-running with an
# unchanged chart version is a harmless no-op. ArtifactHub picks up the
# index via the gh-pages URL.

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - '.github/workflows/helm-release.yml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Import GPG signing key
        # Reconstitutes the signing key from the base64-encoded secret into a
        # legacy gpg keyring file that Helm 3's --sign can read. The passphrase
        # is empty by convention (CI-only key, scoped to chart signing).
        id: gpg
        env:
          KEY_B64: ${{ secrets.HELM_SIGNING_KEY_B64 }}
          PASSPHRASE: ${{ secrets.HELM_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "$KEY_B64" ]; then
            echo "::warning::HELM_SIGNING_KEY_B64 unset — chart will not be signed."
            echo "sign=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "$KEY_B64" | base64 -d > ~/.gnupg/secring.gpg
          # Identify the signing key UID + fingerprint for later steps.
          uid=$(gpg --no-default-keyring --keyring ~/.gnupg/secring.gpg \
                --list-keys --with-colons \
                | awk -F: '/^uid:/{print $10; exit}')
          fpr=$(gpg --no-default-keyring --keyring ~/.gnupg/secring.gpg \
                --list-keys --with-colons \
                | awk -F: '/^fpr:/{print $10; exit}')
          echo "sign=true"  >> "$GITHUB_OUTPUT"
          echo "key_uid=$uid"     >> "$GITHUB_OUTPUT"
          echo "key_fpr=$fpr"     >> "$GITHUB_OUTPUT"
          echo "$PASSPHRASE" > /tmp/helm-passphrase
          echo "imported key: $fpr ($uid)"

      - name: Lint chart
        run: helm lint helm/observability-mcp

      - name: Template chart (smoke)
        run: |
          helm template smoke helm/observability-mcp \
            --set sources.prometheusUrl=http://prometheus:9090 \
            --set ingress.enabled=true \
            --set auth.enabled=true \
            --set auth.token=test \
            --set persistence.enabled=true \
            --set autoscaling.enabled=true > /tmp/rendered.yaml
          wc -l /tmp/rendered.yaml

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
          mark_as_latest: "true"
          skip_existing: "true"
          # GPG signing — produces .tgz.prov alongside the chart tarball.
          # ArtifactHub picks up the provenance file from the same URL as
          # the chart and grants the "signed" label.
          sign: ${{ steps.gpg.outputs.sign }}
          key: ${{ steps.gpg.outputs.key_uid }}
          keyring: ~/.gnupg/secring.gpg
          passphrase-file: /tmp/helm-passphrase
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wipe signing material
        if: always()
        run: |
          shred -u /tmp/helm-passphrase 2>/dev/null || rm -f /tmp/helm-passphrase
          rm -rf ~/.gnupg

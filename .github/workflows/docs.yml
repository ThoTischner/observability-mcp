name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: '3.12'
      - name: Install MkDocs + Material + plugins
        # Pinned exact pip + package versions for OpenSSF
        # Scorecard's PinnedDependenciesID. `--no-deps` keeps the
        # surface narrow; `pip install --upgrade pip==25.0.1` makes
        # the runtime pip version deterministic.
        run: |
          python -m pip install --upgrade "pip==25.0.1"
          pip install "mkdocs==1.6.1" "mkdocs-material==9.5.50" "pymdown-extensions==10.13"
      - name: Build site
        # P10: --strict is on. Every cross-repo link in docs/ must
        # either point at another docs/ page or use a full GitHub
        # URL. A regression that adds a broken link now fails CI
        # immediately instead of shipping silently.
        run: mkdocs build --strict
      - name: Merge Helm chart-releaser repo into site/
        # We switched Pages source from the gh-pages branch to a
        # workflow-driven deploy so MkDocs could serve from /. The
        # chart-releaser workflow still pushes index.yaml + chart
        # tarballs to gh-pages, and operators rely on the same URL
        # for `helm repo add observability-mcp https://thotischner.github.io/observability-mcp`.
        # Copy those files into the MkDocs output BEFORE upload so
        # both surfaces live side by side under the same Pages site:
        #   /                 → MkDocs landing
        #   /index.yaml       → Helm repo index
        #   /<chart>-X.Y.Z.tgz → chart tarballs
        # mkdocs's own index.html stays in place (it was written
        # first and copy never overwrites it because cp -n skips
        # existing). The gh-pages root index.html is the chart-
        # releaser auto-generated listing — fine to drop.
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          set -euo pipefail
          if git fetch --depth 1 origin gh-pages 2>/dev/null; then
            git worktree add /tmp/ghpages FETCH_HEAD
            # copy *.tgz, *.tgz.prov, index.yaml, artifacthub-repo.yml,
            # .artifacthub-repo.yml — skip index.html (mkdocs landing
            # wins) and the chart-releaser noise.
            #
            # artifacthub-repo.yml is what claims the chart for the
            # ArtifactHub Verified Publisher badge. Without it the
            # badge silently drops on the next scan.
            shopt -s nullglob
            for f in /tmp/ghpages/*.tgz /tmp/ghpages/*.tgz.prov /tmp/ghpages/index.yaml /tmp/ghpages/artifacthub-repo.yml /tmp/ghpages/.artifacthub-repo.yml; do
              [ -f "$f" ] || continue
              cp -n "$f" site/
              echo "  preserved $(basename "$f")"
            done
            # The connector hub catalog lives on gh-pages under hub/ (published
            # by hub-pages.yml). Pages serves from THIS main-built site, not the
            # gh-pages branch, so mirror hub/ in too — otherwise
            # /hub/index.json + /hub/catalog/*.json 404 even though they exist
            # on the branch. This is the path the in-app connector hub fetches.
            if [ -d /tmp/ghpages/hub ]; then
              mkdir -p site/hub
              cp -r /tmp/ghpages/hub/. site/hub/
              echo "  preserved hub/ connector catalog"
            fi
            git worktree remove --force /tmp/ghpages || true
            echo "::notice::Helm repo files preserved alongside docs site"
          else
            echo "::notice::No gh-pages branch yet — nothing to preserve"
          fi
          # Source-of-truth path: ship the repo-root .artifacthub-repo.yml
          # under the dotless name ArtifactHub expects at the chart-repo
          # URL. This puts the publisher-claim in main/PR diffs instead
          # of only-on-gh-pages where stale or drift goes unnoticed.
          if [ -f .artifacthub-repo.yml ]; then
            cp .artifacthub-repo.yml site/artifacthub-repo.yml
            echo "::notice::Copied .artifacthub-repo.yml → site/artifacthub-repo.yml"
          fi
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

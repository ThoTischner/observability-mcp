name: Security scan

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Branch protection requires job-name 'npm-audit (mcp-server)' and
        # 'npm-audit (agent)' — keep the short names stable across repo
        # refactors by mapping a friendly name to its path.
        include:
          - name: mcp-server
            path: mcp-server
          - name: agent
            path: examples/agent
    name: npm-audit (${{ matrix.name }})
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
      - name: Ensure lockfile exists (${{ matrix.path }})
        # Resolve-only npm pass (--package-lock-only --ignore-scripts)
        # so the audit step downstream has something to audit even in
        # the projects that don't commit a lockfile (agent +
        # connectors are intentionally lockfile-less so consumers
        # don't inherit our resolution). OpenSSF Scorecard flags the
        # bare `npm install` invocation; the value of pinning is moot
        # here because nothing is actually installed (no scripts
        # run, no files placed in node_modules).
        working-directory: ./${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          fi
      - name: npm audit (${{ matrix.path }})
        working-directory: ./${{ matrix.path }}
        run: npm audit --audit-level=high

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
      - name: Install
        working-directory: ./mcp-server
        run: npm ci
      - name: Run tests
        working-directory: ./mcp-server
        run: npx tsx --test src/analysis/*.test.ts src/config/*.test.ts src/sdk/*.test.ts src/auth/*.test.ts src/auth/oidc/*.test.ts src/auth/policy/*.test.ts src/tenancy/*.test.ts src/products/*.test.ts src/audit/*.test.ts src/catalog/*.test.ts src/policy/*.test.ts src/quota/*.test.ts src/connectors/verify.test.ts src/connectors/hub.test.ts src/connectors/install.test.ts src/cli/*.test.ts src/tools/*.test.ts src/net/*.test.ts src/openapi.test.ts src/enterprise-gate.test.ts
      - name: Connector hub catalog (validate + in-sync)
        run: |
          node hub/build-catalog.mjs --check
          node --test hub/build-catalog.test.mjs
      - name: Audit-verifier CLI (end-to-end)
        run: node --test scripts/verify-audit.test.mjs
      - name: IP-enrich CSV converter CLI (end-to-end)
        run: node --test scripts/build-ip-enrich-csv.test.mjs
      - name: Connectors (tests + manifest/catalog integrity in sync)
        run: |
          node --test connectors/*/*.test.mjs connectors/*/contract/*.test.mjs
          node -e '
            const c=require("crypto"),fs=require("fs"),p=require("path");
            for (const d of fs.readdirSync("connectors",{withFileTypes:true})) {
              if (!d.isDirectory()) continue;
              const dir="connectors/"+d.name;
              const pkg=JSON.parse(fs.readFileSync(p.join(dir,"package.json")));
              if (pkg.observabilityMcp?.kind!=="connector") continue;
              const i="sha256-"+c.createHash("sha256").update(fs.readFileSync(p.join(dir,"index.js"))).digest("base64");
              const m=JSON.parse(fs.readFileSync(p.join(dir,"manifest.json")));
              if(m.integrity!==i){console.error(d.name+": manifest.integrity stale "+m.integrity+" != "+i);process.exit(1)}
              const cat=JSON.parse(fs.readFileSync("hub/catalog/"+d.name+".json"));
              if(cat.versions[0].integrity!==i){console.error(d.name+": catalog integrity stale");process.exit(1)}
              console.log(d.name+" integrity in sync");
            }
          '
      - name: Connector packer tests
        run: node --test connectors/pack.test.mjs

  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./mcp-server
          push: false
          load: true
          tags: observability-mcp:scan
      - name: Run Trivy on image
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          image-ref: observability-mcp:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

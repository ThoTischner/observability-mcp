name: Security scan

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Branch protection requires job-name 'npm-audit (mcp-server)' and
        # 'npm-audit (agent)' — keep the short names stable across repo
        # refactors by mapping a friendly name to its path.
        include:
          - name: mcp-server
            path: mcp-server
          - name: agent
            path: examples/agent
    name: npm-audit (${{ matrix.name }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Ensure lockfile exists (${{ matrix.path }})
        working-directory: ./${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --ignore-scripts
          fi
      - name: npm audit (${{ matrix.path }})
        working-directory: ./${{ matrix.path }}
        run: npm audit --audit-level=high

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Install
        working-directory: ./mcp-server
        run: npm ci
      - name: Run tests
        working-directory: ./mcp-server
        run: npx tsx --test src/analysis/*.test.ts src/config/*.test.ts src/sdk/*.test.ts src/auth/*.test.ts src/audit/*.test.ts src/catalog/*.test.ts src/policy/*.test.ts src/quota/*.test.ts src/connectors/verify.test.ts src/connectors/hub.test.ts src/connectors/install.test.ts src/cli/*.test.ts
      - name: Connector hub catalog (validate + in-sync)
        run: |
          node hub/build-catalog.mjs --check
          node --test hub/build-catalog.test.mjs
      - name: Audit-verifier CLI (end-to-end)
        run: node --test scripts/verify-audit.test.mjs
      - name: Connectors (tests + manifest/catalog integrity in sync)
        run: |
          node --test connectors/*/*.test.mjs connectors/*/contract/*.test.mjs
          node -e '
            const c=require("crypto"),fs=require("fs"),p=require("path");
            for (const d of fs.readdirSync("connectors",{withFileTypes:true})) {
              if (!d.isDirectory()) continue;
              const dir="connectors/"+d.name;
              const pkg=JSON.parse(fs.readFileSync(p.join(dir,"package.json")));
              if (pkg.observabilityMcp?.kind!=="connector") continue;
              const i="sha256-"+c.createHash("sha256").update(fs.readFileSync(p.join(dir,"index.js"))).digest("base64");
              const m=JSON.parse(fs.readFileSync(p.join(dir,"manifest.json")));
              if(m.integrity!==i){console.error(d.name+": manifest.integrity stale "+m.integrity+" != "+i);process.exit(1)}
              const cat=JSON.parse(fs.readFileSync("hub/catalog/"+d.name+".json"));
              if(cat.versions[0].integrity!==i){console.error(d.name+": catalog integrity stale");process.exit(1)}
              console.log(d.name+" integrity in sync");
            }
          '
      - name: Connector packer tests
        run: node --test connectors/pack.test.mjs

  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./mcp-server
          push: false
          load: true
          tags: observability-mcp:scan
      - name: Run Trivy on image
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          image-ref: observability-mcp:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

name: Security scan

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * *'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Branch protection requires job-name 'npm-audit (mcp-server)' and
        # 'npm-audit (agent)' — keep the short names stable across repo
        # refactors by mapping a friendly name to its path.
        include:
          - name: mcp-server
            path: mcp-server
          - name: agent
            path: examples/agent
    name: npm-audit (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Ensure lockfile exists (${{ matrix.path }})
        working-directory: ./${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --ignore-scripts
          fi
      - name: npm audit (${{ matrix.path }})
        working-directory: ./${{ matrix.path }}
        run: npm audit --audit-level=high

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install
        working-directory: ./mcp-server
        run: npm ci
      - name: Run tests
        working-directory: ./mcp-server
        run: npx tsx --test src/analysis/*.test.ts src/config/*.test.ts src/sdk/*.test.ts

  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-server
          push: false
          load: true
          tags: observability-mcp:scan
      - name: Run Trivy on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: observability-mcp:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

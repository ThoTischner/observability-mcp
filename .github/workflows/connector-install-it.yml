name: Connector install integration

# Deterministic, network-free end-to-end test of the connector install
# flows the hub advertises (air-gapped --offline-dir, manual verify,
# fail-closed tamper + missing-trust-root). Complements the unit/contract
# tests (which mock fetch) and helm-integration (which covers the Helm
# init-container path).

on:
  pull_request:
    paths:
      - 'connectors/**'
      - 'mcp-server/src/cli/**'
      - 'mcp-server/src/connectors/verify.ts'
      - '.github/workflows/connector-install-it.yml'
  push:
    branches: [main]
    paths:
      - 'connectors/**'
      - 'mcp-server/src/cli/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Build CLI
        working-directory: ./mcp-server
        run: npm ci && npm run build
      - name: Connector install flows (every connectors/*)
        run: |
          for d in connectors/*/; do
            [ -f "$d/package.json" ] || continue
            kind=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$d/package.json')).observabilityMcp?.kind||'')}catch{console.log('')}")
            [ "$kind" = "connector" ] || continue
            name=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$d/package.json')).observabilityMcp.name)")
            echo "=== install-it: $name ==="
            sh connectors/install-it.sh "$name"
          done
      - name: Loader functional smoke (connectors load & are callable)
        # The install-it scenario exercises the source path where
        # connectors live in the workspace without a signed
        # manifest — VERIFY_PLUGINS defaults to true (Phase F1) so
        # they would otherwise be skipped. Opt out for THIS job
        # only; production deployments keep the default-on
        # signature gate.
        env:
          VERIFY_PLUGINS: "false"
        run: node connectors/loader-smoke.mjs

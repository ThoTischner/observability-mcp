services:
  # ============================================================
  # CORE — always runs.
  # `docker compose up mcp-server` gives a bare server you can point at
  # your own Prometheus/Loki via the Web UI or env vars.
  # ------------------------------------------------------------
  # DEMO PROFILE — `docker compose --profile demo up` adds the example
  # microservices, Prometheus, Loki, Promtail, and the autonomous agent
  # so you can see chaos detection end-to-end without external infra.
  # ============================================================

  # --- Example Microservices (demo) ---
  api-gateway:
    profiles: ["demo"]
    build:
      context: ./examples/example-services
    environment:
      - SERVICE_NAME=api-gateway
      - PORT=8080
    ports:
      - "8080:8080"
    labels:
      logging: "promtail"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability

  payment-service:
    profiles: ["demo"]
    build:
      context: ./examples/example-services
    environment:
      - SERVICE_NAME=payment-service
      - PORT=8081
    ports:
      - "8081:8081"
    labels:
      logging: "promtail"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability

  order-service:
    profiles: ["demo"]
    build:
      context: ./examples/example-services
    environment:
      - SERVICE_NAME=order-service
      - PORT=8082
    ports:
      - "8082:8082"
    labels:
      logging: "promtail"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability

  # --- Observability Stack (demo) ---
  prometheus:
    profiles: ["demo"]
    image: prom/prometheus:v2.53.0
    volumes:
      - ./examples/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      api-gateway:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

  loki:
    profiles: ["demo"]
    image: grafana/loki:3.1.0
    volumes:
      - ./examples/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - observability

  promtail:
    profiles: ["demo"]
    image: grafana/promtail:3.1.0
    volumes:
      - ./examples/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy

  # --- k3s (demo) ---
  # Single-node Kubernetes for the topology connector demo. Lives on the
  # observability network so mcp-server can reach the API at https://k3s:6443.
  # k3s writes its kubeconfig to /output/kubeconfig.yaml; k3s-init rewrites
  # 127.0.0.1 → k3s and applies the demo workload.
  k3s:
    profiles: ["demo"]
    image: rancher/k3s:v1.31.3-k3s1
    command:
      - server
      - --tls-san=k3s
      - --disable=traefik
      - --disable=metrics-server
      - --disable=servicelb
    privileged: true
    tmpfs:
      - /run
      - /var/run
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
    healthcheck:
      test: ["CMD-SHELL", "kubectl get --raw=/healthz | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped
    networks:
      - observability

  # Rewrites the k3s kubeconfig so the server URL is reachable inside the
  # docker network, then waits for node-Ready and applies the demo workload.
  # One-shot — mcp-server depends on it completing successfully.
  k3s-init:
    profiles: ["demo"]
    image: rancher/k3s:v1.31.3-k3s1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until [ -f /output/kubeconfig.yaml ]; do sleep 1; done
        sed 's|https://127.0.0.1:6443|https://k3s:6443|g' /output/kubeconfig.yaml > /output/kubeconfig-internal.yaml
        export KUBECONFIG=/output/kubeconfig-internal.yaml
        until kubectl get nodes 2>/dev/null | grep -qE '\sReady\s'; do
          echo "waiting for node Ready..."
          sleep 2
        done
        kubectl apply -f /workload/workload.yaml
        kubectl -n omcp-demo rollout status deployment/omcp-demo-echo --timeout=120s
        kubectl -n omcp-demo rollout status deployment/omcp-demo-frontend --timeout=120s
        echo "k3s demo workload ready"
    volumes:
      - k3s-kubeconfig:/output
      - ./examples/kubernetes:/workload:ro
    depends_on:
      k3s:
        condition: service_healthy
    networks:
      - observability

  # --- MCP Server ---
  mcp-server:
    build:
      context: ./mcp-server
    ports:
      - "3000:3000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      # The kubernetes source in config/sources.yaml reads this. In
      # non-demo runs the file simply isn't present and the source
      # reports "down" — connector failures don't block startup.
      - KUBECONFIG=/k3s-kubeconfig/kubeconfig-internal.yaml
    volumes:
      - k3s-kubeconfig:/k3s-kubeconfig:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/sources"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    # depends_on entries here all belong to the demo profile. When demo
    # is not active, compose silently drops them — mcp-server still
    # starts standalone (pointing at external backends or with sources
    # added later via the Web UI).
    depends_on:
      k3s-init:
        condition: service_completed_successfully
        required: false

  # --- AI Agent (demo) ---
  agent:
    profiles: ["demo"]
    build:
      context: ./examples/agent
    environment:
      - MCP_URL=http://mcp-server:3000/mcp
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1:8b
      - CHECK_INTERVAL=30000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
    networks:
      - observability
    depends_on:
      mcp-server:
        condition: service_healthy

volumes:
  loki-data:
  k3s-server:
  k3s-kubeconfig:

networks:
  observability:
    driver: bridge

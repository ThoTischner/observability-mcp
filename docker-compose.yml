services:
  # ============================================================
  # CORE — always runs.
  # `docker compose up mcp-server` gives a bare server you can point at
  # your own Prometheus/Loki via the Web UI or env vars.
  # ------------------------------------------------------------
  # DEMO PROFILE — `docker compose --profile demo up` adds:
  #   * a single-node k3s cluster
  #   * the three chaos-able example services as Kubernetes Deployments
  #     inside that cluster
  #   * Prometheus + Loki + Promtail (running on the docker-compose side)
  #     scraping the cluster's NodePorts and pod logs
  #   * the autonomous agent
  #
  # The example services live in k3s on purpose: it is the same demo
  # workload that emits metrics and logs and that shows up in the
  # topology graph — that is what lets the agent correlate a metric or
  # log anomaly with its underlying host via `get_blast_radius`.
  # ============================================================

  # --- k3s (demo) ---
  # Single-node Kubernetes for the topology connector + workloads.
  # NodePorts 30080/30081/30082 (the example services) are mapped to
  # the host as 8080/8081/8082 so the documented chaos URLs
  # (`curl localhost:8081/chaos/error-spike`) keep working unchanged
  # after the move from compose to k8s.
  k3s:
    profiles: ["demo"]
    image: rancher/k3s:v1.31.3-k3s1
    command:
      - server
      - --tls-san=k3s
      - --disable=traefik
      - --disable=metrics-server
      - --disable=servicelb
    privileged: true
    tmpfs:
      - /run
      - /var/run
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
      # Pod logs are written to /var/log/pods inside the k3s container.
      # We expose them as a named volume so the promtail container can
      # tail them from outside k3s.
      - k3s-pod-logs:/var/log/pods
    ports:
      - "8080:30080"
      - "8081:30081"
      - "8082:30082"
    healthcheck:
      test: ["CMD-SHELL", "kubectl get --raw=/healthz | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped
    networks:
      - observability

  # --- image-loader (demo) ---
  # One-shot. Builds the `example-service:demo` image from the source in
  # examples/example-services, then pipes the OCI tarball into k3s'
  # embedded containerd (k8s.io namespace) via `ctr images import`.
  # This avoids needing a local image registry — the kubelet finds the
  # image in containerd directly. Manifests pin `imagePullPolicy: Never`
  # so the demo stays airgap-clean (no Docker-Hub round-trip).
  image-loader:
    profiles: ["demo"]
    image: docker:27-cli
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "building example-service:demo ..."
        docker build -t example-service:demo /src/example-services
        echo "waiting for the k3s sibling container ..."
        until k3s_id=$$(docker ps -q --filter "label=com.docker.compose.service=k3s") && [ -n "$$k3s_id" ]; do sleep 2; done
        echo "k3s container: $$k3s_id"
        until docker exec "$$k3s_id" kubectl get --raw=/healthz 2>/dev/null | grep -q ok; do sleep 2; done
        echo "importing example-service:demo into k3s containerd (namespace k8s.io) ..."
        docker save example-service:demo | docker exec -i "$$k3s_id" ctr -a /run/k3s/containerd/containerd.sock -n k8s.io images import -
        echo "image-loader done"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./examples:/src:ro
    depends_on:
      k3s:
        condition: service_healthy
    networks:
      - observability

  # k3s-init: rewrite kubeconfig for in-network use (k3s' default points
  # at 127.0.0.1), then apply the demo workload and wait for rollouts.
  # Splits cleanly from image-loader so the dependency graph is obvious:
  # image must be in containerd before kubectl-apply runs.
  k3s-init:
    profiles: ["demo"]
    image: rancher/k3s:v1.31.3-k3s1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until [ -f /output/kubeconfig.yaml ]; do sleep 1; done
        sed 's|https://127.0.0.1:6443|https://k3s:6443|g' /output/kubeconfig.yaml > /output/kubeconfig-internal.yaml
        export KUBECONFIG=/output/kubeconfig-internal.yaml
        until kubectl get nodes 2>/dev/null | grep -qE '\sReady\s'; do
          echo "waiting for node Ready..."
          sleep 2
        done
        kubectl apply -f /workload/workload.yaml
        for d in api-gateway payment-service order-service; do
          kubectl -n omcp-demo rollout status deployment/$$d --timeout=180s
        done
        echo "k3s demo workload ready"
    volumes:
      - k3s-kubeconfig:/output
      - ./examples/kubernetes:/workload:ro
    depends_on:
      k3s:
        condition: service_healthy
      image-loader:
        condition: service_completed_successfully
    networks:
      - observability

  # --- Observability Stack (demo) ---
  prometheus:
    profiles: ["demo"]
    image: prom/prometheus:v2.53.0
    volumes:
      - ./examples/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      k3s-init:
        condition: service_completed_successfully

  loki:
    profiles: ["demo"]
    image: grafana/loki:3.1.0
    volumes:
      - ./examples/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - observability

  # Promtail tails the k3s pod log directory (shared via the k3s-pod-logs
  # named volume). Container/namespace/pod labels are extracted from the
  # file path by the pipeline in examples/promtail/promtail-config.yml —
  # no docker socket needed.
  promtail:
    profiles: ["demo"]
    image: grafana/promtail:3.1.0
    volumes:
      - ./examples/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - k3s-pod-logs:/var/log/pods:ro
    command: -config.file=/etc/promtail/config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
      k3s-init:
        condition: service_completed_successfully

  # --- MCP Server ---
  mcp-server:
    build:
      context: ./mcp-server
    ports:
      - "3000:3000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      # The kubernetes source in config/sources.yaml reads this. In a
      # non-demo run the file is absent and the source reports "down"
      # without blocking startup.
      - KUBECONFIG=/k3s-kubeconfig/kubeconfig-internal.yaml
    volumes:
      - k3s-kubeconfig:/k3s-kubeconfig:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/sources"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    # depends_on entries here all belong to the demo profile. When demo
    # is not active, compose silently drops them — mcp-server still
    # starts standalone (pointing at external backends or with sources
    # added later via the Web UI).
    depends_on:
      k3s-init:
        condition: service_completed_successfully
        required: false

  # ============================================================
  # AUTH PROFILE — `docker compose --profile auth up` adds a Keycloak
  # with the omcp-demo realm pre-imported. The mcp-server boot env
  # under this profile flips OMCP_AUTH to "oidc" so visiting
  # http://localhost:3000 redirects to the IdP for sign-in.
  #
  # Demo credentials (DO NOT USE IN PROD) live in
  #   examples/keycloak/omcp-demo-realm.json
  # admin/admin, operator/operator, viewer/viewer.
  # ============================================================

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:26.3.5
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      - KEYCLOAK_ADMIN=keycloak
      - KEYCLOAK_ADMIN_PASSWORD=keycloak
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      # Pin the advertised issuer so the discovery doc and OMCP's
      # OMCP_OIDC_ISSUER match deterministically, independent of the
      # Host header on the discovery request.
      - KC_HOSTNAME=http://localhost:8088
    ports:
      - "8088:8080"
    volumes:
      - ./examples/keycloak/omcp-demo-realm.json:/opt/keycloak/data/import/omcp-demo-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s
    restart: unless-stopped
    networks:
      - observability

  # OIDC-flavored mcp-server. Binds host port 3001 so it doesn't fight
  # the default mcp-server's 3000 binding when both profiles are active
  # (also lets you run `--profile demo --profile auth` to compare). All
  # of the OIDC URLs reference :3001 accordingly.
  mcp-server-oidc:
    profiles: ["auth"]
    build:
      context: ./mcp-server
    ports:
      - "3001:3000"
    environment:
      - OMCP_AUTH=oidc
      # Inside the docker network keycloak is reachable by hostname;
      # from the browser it's localhost:8088. Both URLs MUST match what
      # Keycloak advertises in the discovery doc — Keycloak emits the
      # issuer from KC_HOSTNAME so we use the localhost form throughout.
      - OMCP_OIDC_ISSUER=http://localhost:8088/realms/omcp-demo
      - OMCP_OIDC_CLIENT_ID=observability-mcp
      - OMCP_OIDC_REDIRECT_URI=http://localhost:3001/api/auth/oidc/callback
      - OMCP_OIDC_ROLES_CLAIM=groups
      - OMCP_OIDC_ROLE_MAP={"omcp-admin":"admin","omcp-ops":"operator","omcp-viewers":"viewer"}
      # 32-char demo secret — stable across restarts so demo sessions
      # survive. DO NOT use this value in production.
      - OMCP_SESSION_SECRET=demo-omcp-session-secret-32chars
    extra_hosts:
      - "localhost:host-gateway"
    healthcheck:
      # /healthz is anonymous-readable in every auth mode; /api/sources
      # would 401 under OMCP_AUTH=oidc and trip `--wait` indefinitely.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      keycloak:
        condition: service_healthy

  # ============================================================
  # OPA PROFILE — `docker compose --profile opa up` adds an Open
  # Policy Agent server with the example Rego policy mounted, and
  # an OMCP server that consults OPA for every RBAC decision.
  # Binds host port 3002 so it doesn't fight the default mcp-server
  # (3000) or the OIDC variant (3001).
  # ============================================================

  opa:
    profiles: ["opa"]
    image: openpolicyagent/opa:1.7.1
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "/policy.rego"]
    ports:
      - "8181:8181"
    volumes:
      - ./examples/opa/policy.rego:/policy.rego:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - observability

  mcp-server-opa:
    profiles: ["opa"]
    build:
      context: ./mcp-server
    ports:
      - "3002:3000"
    environment:
      - OMCP_OPA_URL=http://opa:8181
      - OMCP_OPA_PACKAGE=observability/authz
      - OMCP_OPA_ROLES=admin,operator,viewer
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      opa:
        condition: service_healthy

  # ============================================================
  # BENCHMARK PROFILE — `docker compose --profile benchmark up` adds:
  #   * Tempo (single-binary) with the metrics-generator enabled, so
  #     trace-derived service-graph signals are visible to the topology
  #     UI/tools via the existing tempo connector.
  #   * An OpenTelemetry Collector "bridge" exposing OTLP gRPC/HTTP on
  #     4317/4318 → forwards traces to Tempo + exposes metrics to be
  #     scraped by Prometheus.
  #
  # This profile does NOT bring up a workload. It expects the
  # OpenTelemetry Demo (Astronomy Shop) running in its own compose
  # project, with services targeting `otel-collector-bridge:4317` on
  # the shared `observability_observability` network.
  # See docs/benchmark-astronomy-shop.md for the orchestration via
  # `make benchmark-up`.
  # ============================================================

  tempo:
    profiles: ["benchmark"]
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./examples/benchmark/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped
    networks:
      - observability

  otel-collector-bridge:
    profiles: ["benchmark"]
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./examples/benchmark/otelcol-bridge.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    restart: unless-stopped
    networks:
      - observability
    depends_on:
      tempo:
        condition: service_healthy

  # --- AI Agent (demo) ---
  agent:
    profiles: ["demo"]
    build:
      context: ./examples/agent
    environment:
      - MCP_URL=http://mcp-server:3000/mcp
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1:8b
      - CHECK_INTERVAL=30000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
    networks:
      - observability
    depends_on:
      mcp-server:
        condition: service_healthy

volumes:
  loki-data:
  k3s-server:
  k3s-kubeconfig:
  k3s-pod-logs:
  tempo-data:

networks:
  observability:
    driver: bridge

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability-mcp.fullname" . }}
  labels:
    {{- include "observability-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "observability-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "observability-mcp.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.sources.config }}
        checksum/sources: {{ .Values.sources.config | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "observability-mcp.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.plugins.image }}
      initContainers:
        # Copies connector plugins out of a dedicated OCI image into a
        # shared emptyDir. The main container then needs no registry
        # access — the airgapped "mounted volume" workflow from
        # docs/plugin-architecture.md.
        - name: extract-plugins
          image: {{ .Values.plugins.image | quote }}
          imagePullPolicy: {{ .Values.plugins.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -eu
              {{- if .Values.plugins.paths }}
              for p in {{ .Values.plugins.paths | join " " }}; do
                cp -a "/plugins/$p" /shared/
              done
              {{- else }}
              cp -a /plugins/. /shared/
              {{- end }}
          volumeMounts:
            - name: plugins
              mountPath: /shared
      {{- end }}
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ include "observability-mcp.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.sources.config }}
            - name: CONFIG_PATH
              value: /app/config/sources.yaml
            {{- end }}
            {{- if .Values.sources.prometheusUrl }}
            - name: PROMETHEUS_URL
              value: {{ .Values.sources.prometheusUrl | quote }}
            {{- end }}
            {{- if .Values.sources.lokiUrl }}
            - name: LOKI_URL
              value: {{ .Values.sources.lokiUrl | quote }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "observability-mcp.authSecretName" . }}
                  key: token
            {{- end }}
            # Always render the flag explicitly so a Helm override of
            # plugins.verify.enabled wins over the server's default-on
            # behaviour. Quoted so "false" reaches the container as the
            # literal string the loader recognises as an opt-out.
            - name: VERIFY_PLUGINS
              value: {{ .Values.plugins.verify.enabled | quote }}
            {{- if include "observability-mcp.needsTrustRoot" . }}
            - name: PLUGIN_TRUST_ROOT
              value: /app/trust/trust-root.pem
            {{- end }}
            {{- if .Values.plugins.uiInstall.enabled }}
            - name: ENABLE_UI_INSTALL
              value: "true"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: OMCP_REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- if .Values.redis.keyPrefix }}
            - name: OMCP_REDIS_KEY_PREFIX
              value: {{ .Values.redis.keyPrefix | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OMCP_OTEL_ENABLED
              value: "true"
            - name: OMCP_OTEL_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- if .Values.otel.headers }}
            - name: OMCP_OTEL_HEADERS
              value: {{ .Values.otel.headers | quote }}
            {{- end }}
            {{- if .Values.otel.serviceName }}
            - name: OMCP_OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            {{- end }}
            - name: OMCP_OTEL_SERVICE_VERSION
              value: {{ include "observability-mcp.imageTag" . | quote }}
            {{- end }}
            {{- if .Values.airgapped }}
            - name: OMCP_AIRGAPPED
              value: "true"
            {{- end }}
            {{- if .Values.scim.enabled }}
            - name: OMCP_SCIM_STORE
              value: {{ .Values.scim.storePath | quote }}
            {{- if .Values.scim.groupRoleMap }}
            - name: OMCP_SCIM_GROUP_ROLE_MAP
              value: {{ .Values.scim.groupRoleMap | quote }}
            {{- end }}
            {{- if or .Values.scim.token .Values.scim.existingSecret }}
            - name: OMCP_SCIM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.scim.existingSecret | default (printf "%s-scim" (include "observability-mcp.fullname" .)) }}
                  key: token
            {{- end }}
            {{- end }}
            {{- if .Values.anomalyHistory.enabled }}
            - name: OMCP_ANOMALY_HISTORY_REMOTE_WRITE
              value: {{ .Values.anomalyHistory.remoteWriteUrl | quote }}
            {{- if .Values.anomalyHistory.headers }}
            - name: OMCP_ANOMALY_HISTORY_HEADERS
              value: {{ .Values.anomalyHistory.headers | quote }}
            {{- end }}
            {{- if or .Values.anomalyHistory.token .Values.anomalyHistory.existingSecret }}
            - name: OMCP_ANOMALY_HISTORY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anomalyHistory.existingSecret | default (printf "%s-anomaly-history" (include "observability-mcp.fullname" .)) }}
                  key: token
            {{- end }}
            {{- end }}
            {{- if .Values.audit.file }}
            - name: OMCP_MGMT_AUDIT_FILE
              value: {{ .Values.audit.file | quote }}
            {{- end }}
            {{- if .Values.audit.webhook.enabled }}
            - name: OMCP_AUDIT_WEBHOOK_URL
              value: {{ .Values.audit.webhook.url | quote }}
            {{- if .Values.audit.webhook.deadLetterFile }}
            - name: OMCP_AUDIT_WEBHOOK_DLQ
              value: {{ .Values.audit.webhook.deadLetterFile | quote }}
            {{- end }}
            {{- if or .Values.audit.webhook.token .Values.audit.webhook.existingSecret }}
            - name: OMCP_AUDIT_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.audit.webhook.existingSecret | default (printf "%s-audit-webhook" (include "observability-mcp.fullname" .)) }}
                  key: token
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.sources.config }}
            - name: sources-config
              mountPath: /app/config/sources.yaml
              subPath: sources.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /app/config
            {{- end }}
            {{- if or .Values.plugins.image .Values.plugins.persistence.enabled }}
            - name: plugins
              mountPath: /app/plugins
              readOnly: {{ if include "observability-mcp.pluginsWritable" . }}false{{ else }}true{{ end }}
            {{- end }}
            {{- if include "observability-mcp.needsTrustRoot" . }}
            - name: trust-root
              mountPath: /app/trust
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.sources.config }}
        - name: sources-config
          configMap:
            name: {{ include "observability-mcp.fullname" . }}-sources
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "observability-mcp.fullname" . }}
        {{- end }}
        {{- if or .Values.plugins.image .Values.plugins.persistence.enabled }}
        - name: plugins
          {{- if .Values.plugins.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.plugins.persistence.existingClaim | default (printf "%s-plugins" (include "observability-mcp.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if include "observability-mcp.needsTrustRoot" . }}
        - name: trust-root
          secret:
            secretName: {{ .Values.plugins.verify.existingSecret | default (printf "%s-trust-root" (include "observability-mcp.fullname" .)) }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

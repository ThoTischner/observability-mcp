{{- if and .Values.scim.enabled .Values.scim.token (not .Values.scim.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observability-mcp.fullname" . }}-scim
  labels:
    {{- include "observability-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.scim.token | quote }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability-mcp.fullname" . }}
  labels:
    {{- include "observability-mcp.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.scrapeAnnotations.enabled }}
    # Vanilla Prometheus scrape config (alternative to ServiceMonitor)
    # for clusters without prometheus-operator. Toggle via
    # `scrapeAnnotations.enabled`.
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.service.port | quote }}
    prometheus.io/path: {{ .Values.scrapeAnnotations.path | default "/metrics" | quote }}
    {{- end }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "observability-mcp.selectorLabels" . | nindent 4 }}

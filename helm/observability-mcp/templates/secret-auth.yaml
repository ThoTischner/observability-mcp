{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) .Values.auth.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observability-mcp.authSecretName" . }}
  labels:
    {{- include "observability-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.auth.token | quote }}
{{- end }}

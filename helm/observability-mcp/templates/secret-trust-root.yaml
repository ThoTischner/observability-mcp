{{- if and (include "observability-mcp.needsTrustRoot" .) .Values.plugins.verify.trustRootPem (not .Values.plugins.verify.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observability-mcp.fullname" . }}-trust-root
  labels:
    {{- include "observability-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  trust-root.pem: |
    {{- .Values.plugins.verify.trustRootPem | nindent 4 }}
{{- end }}

# Default values for observability-mcp.
# Production deployments should override at least: image.tag, ingress, auth.token, sources.

image:
  repository: ghcr.io/thotischner/observability-mcp
  # Override at install time: --set image.tag=v1.3.4
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

# The MCP server holds session state per Streamable HTTP session, so
# multiple replicas need sticky-session ingress (or an external session
# store, which is on the roadmap). Default is 1.
strategy:
  type: Recreate

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Authentication for the /mcp endpoint. If unset, the endpoint is open —
# only acceptable for trusted networks. Set existingSecret OR token.
auth:
  enabled: false
  # If set, this secret must contain key 'token'. Takes precedence over .token.
  existingSecret: ""
  # Plain-text token (rendered into a Secret managed by the chart).
  # Prefer existingSecret for real deployments.
  token: ""

# Observability backends. Empty by default — the operator must configure
# at least one source via sources.yaml mounted as a ConfigMap, or via
# env vars (PROMETHEUS_URL, LOKI_URL).
sources:
  # Inline sources.yaml content. If non-empty, rendered into a ConfigMap
  # and mounted at /app/config/sources.yaml.
  # Example:
  # config: |
  #   sources:
  #     - name: prometheus
  #       type: prometheus
  #       url: http://prometheus.monitoring.svc.cluster.local:9090
  #       enabled: true
  #     - name: loki
  #       type: loki
  #       url: http://loki.logging.svc.cluster.local:3100
  #       enabled: true
  #     # Optional per-tenant source — visible only to callers in
  #     # tenant "acme" (resolved from the OIDC tenant claim or
  #     # OMCP_KEY_TENANTS). Untagged sources stay global. See
  #     # docs/tenancy.md.
  #     - name: acme-loki
  #       type: loki
  #       url: http://loki.acme.svc.cluster.local:3100
  #       enabled: true
  #       tenant: acme
  config: ""
  # Alternative: comma-separated URLs as env vars (handled by the server).
  prometheusUrl: ""
  lokiUrl: ""

# Extra environment variables passed to the container.
# Use the list-of-{name, value | valueFrom} shape Kubernetes expects.
# Common knobs:
#   - MCP_LOG_LEVEL  — runtime log verbosity (info / debug)
#   - OMCP_AUTH      — anonymous (default) | basic | oidc
#                        anonymous → demo / single-operator
#                        basic     → see docs/auth-basic.md
#                        oidc      → see docs/auth-oidc.md
#   - OMCP_OIDC_ISSUER / _CLIENT_ID / _REDIRECT_URI / _CLIENT_SECRET
#   - OMCP_OIDC_SCOPES / _ROLES_CLAIM / _ROLE_MAP / _LOGOUT_REDIRECT
#   - OMCP_USERS_FILE              path to the local-users JSON file (basic mode)
#   - OMCP_SESSION_SECRET          ≥32-char HMAC key for signing session cookies
#   - OMCP_API_KEYS                bearer tokens for the /mcp transport,
#                                  "name:token,name2:token2" or a bare token
#   - OMCP_KEY_SOURCES             coarse per-credential source allow-list,
#                                  "agent=prom-prod|loki-prod;ci=prom-staging"
#   - OMCP_KEY_TENANTS             per-credential tenant assignment,
#                                  "agent=acme;ci=bigco"; unlisted → "default"
#   - OMCP_KEY_BYPASS_REDACTION    comma-separated credential names allowed
#                                  to bypass /mcp log redaction via the
#                                  bypass_redaction tool arg (off by default)
#   - OMCP_RBAC_POLICY_FILE        YAML/JSON file with per-role grants,
#                                  replaces the built-in DEFAULT_POLICY;
#                                  fail-closed on parse error.
#                                  see docs/policy-engines.md
#   - OMCP_OPA_URL                 external OPA endpoint (e.g. http://opa:8181);
#                                  when set, RBAC decisions go through OPA.
#                                  Tenant is passed in input.tenant — Rego
#                                  rules can be tenant-conditional.
#   - OMCP_OPA_PACKAGE             OPA package path (default "observability/authz")
#   - OMCP_OPA_ROLES               comma-separated declared roles for the
#                                  Policy UI catalogue
#   - OMCP_OPA_TOKEN               optional bearer token for OPA's
#                                  --authentication=token
#   - OMCP_MGMT_AUDIT_FILE         JSONL audit log; in-memory ring (500) when unset
#   - OMCP_SERVICE_CATALOG_FILE    owner / tier / on-call / SLO metadata
#   - OMCP_TOOL_RATE_PER_MIN       per-identity /mcp cap; default 60.
#                                  Set to off/none/unlimited/disabled/
#                                  false (case-insensitive) to disable
#                                  the cap entirely — useful when an
#                                  upstream gateway already enforces
#                                  quotas. /api/usage reports
#                                  limit: null in that mode.
#   - OMCP_KEY_RATE_PER_MIN        per-credential override of the
#                                  /mcp cap, "agent=600;ci=240" style
#                                  (mirrors OMCP_KEY_TENANTS /
#                                  OMCP_KEY_PRODUCTS). Same disable
#                                  vocabulary as the global override.
#                                  Unknown credentials fall back to
#                                  the global default.
#   - OMCP_TOOL_DAILY_TOKENS       per-identity 24h-rolling token cap;
#                                  default 0 (uncapped). Charges only
#                                  named bearer-token callers, never
#                                  anonymous /mcp traffic. See
#                                  docs/access-control.md.
#   - OMCP_TOKEN_BUDGET_FILE       JSON snapshot path so per-identity
#                                  budgets survive restarts; unset →
#                                  in-memory only (resets on every
#                                  boot).
#   - OMCP_PRODUCTS_FILE           YAML catalogue of MCP Products
#                                  (curated tool bundles per
#                                  tenant/agent). Empty when unset;
#                                  see docs/products.md. Hot-reload
#                                  on file change is automatic — no
#                                  pod restart needed when the
#                                  mounted ConfigMap is re-applied.
#   - OMCP_KEY_PRODUCTS            "name=productId;..." binding of
#                                  named bearer credentials to MCP
#                                  Products. /mcp tools/list is
#                                  filtered to the Product's tools
#                                  allow-list on each new session.
#   - OMCP_REDACTION               on (default) | off — see docs/redaction.md
#   - OMCP_TRUST_PROXY             true | loopback | <hops> | <ip,ip,...>
#   - OMCP_AUTH_ALLOW_FALLBACK     true → degrade to anonymous on basic-mode
#                                  boot misconfig; OFF by default (fail-closed)
# Detailed runbook: docs/access-control.md
extraEnv: []

# OpenTelemetry self-tracing of the gateway. Opt-in: when enabled,
# the Node SDK auto-instruments HTTP so every /api/* and /mcp request
# becomes a span exported to the configured OTLP endpoint. The
# resource is tagged service.name=observability-mcp + the chart's
# image tag as service.version + the pod hostname as
# service.instance.id. See docs/self-observability.md.
otel:
  enabled: false
  # OTLP/HTTP traces endpoint. Typical values:
  #   http://tempo:4318/v1/traces        (in-cluster Tempo)
  #   http://otel-collector:4318/v1/traces
  endpoint: "http://localhost:4318/v1/traces"
  # Comma-separated key=value pairs forwarded as OTLP request
  # headers (e.g. "Authorization=Bearer ..."). Reference a Secret via
  # extraEnv if the value is sensitive.
  headers: ""
  # Override resource service.name (otherwise defaults to
  # "observability-mcp").
  serviceName: ""
  # - name: MCP_LOG_LEVEL
  #   value: info
  # - name: OMCP_AUTH
  #   value: basic
  # - name: OMCP_USERS_FILE
  #   value: /etc/observability-mcp/users.json
  # - name: OMCP_SESSION_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: omcp-session
  #       key: secret

# Connector plugins. Builtin Prometheus/Loki need no configuration —
# this block is only for additional / airgapped connectors. See
# docs/plugin-architecture.md.
plugins:
  # OCI image containing ONLY a /plugins tree. An init container copies
  # the selected paths into an emptyDir mounted at /app/plugins, so the
  # main container never needs registry access (airgapped-friendly).
  #
  # Defaults to the official signed multi-connector bundle so a plain
  # `helm install` already has the optional connectors available (they
  # stay inert until a matching source is configured). For airgapped
  # clusters mirror this image and override with the mirror. Set to ""
  # to disable the init container entirely (builtin Prometheus/Loki only).
  image: "ghcr.io/thotischner/observability-mcp-plugins:latest"
  imagePullPolicy: IfNotPresent
  # Subdirectories of /plugins to extract. Empty = copy everything.
  paths: []
  # Fail-closed signature + integrity verification (VERIFY_PLUGINS).
  # Builtin connectors are part of the trusted image and are never gated.
  # Default ON since v2.0 — to load unsigned filesystem plugins set
  # enabled=false explicitly. Without a trust root configured, no
  # filesystem plugins load (only builtins), which is the safe default
  # for any cluster that did not opt into signed plugin distribution.
  verify:
    enabled: true
    # PEM public key used as the trust root. Provide it inline (rendered
    # into a Secret) OR point existingSecret at a Secret that has the
    # key `trust-root.pem`.
    trustRootPem: ""
    existingSecret: ""
  # Persist runtime-installed connectors. By default /app/plugins is an
  # emptyDir reseeded from `image` on every start, so connectors added at
  # runtime (Web UI / bundle upload / `omcp plugin install`) are LOST on
  # pod restart. Enable this to back /app/plugins with a PVC so they
  # survive restarts; the init container still refreshes the bundled
  # connectors on top (additive copy — your installs are kept).
  persistence:
    enabled: false
    existingClaim: ""
    size: 1Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  # Enable the Web UI / API connector install + upload endpoints
  # (ENABLE_UI_INSTALL). Runtime code-load is powerful, so this is OFF
  # by default and ALWAYS fail-closed verified — it requires a plugin
  # trust root (set verify.trustRootPem or verify.existingSecret).
  # Pair with persistence.enabled so UI-installed connectors survive.
  uiInstall:
    enabled: false

service:
  type: ClusterIP
  port: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/affinity: cookie
    # nginx.ingress.kubernetes.io/session-cookie-name: mcp-session
  hosts:
    - host: observability-mcp.example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: observability-mcp-tls
    #   hosts:
    #     - observability-mcp.example.local

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # MCP sessions are sticky to a pod — enabling HPA without sticky-session
  # ingress will fragment sessions across replicas.

# Pod-level security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # node writes to /tmp; switch to true with emptyDir tmp

# Persistent config — if you edit sources via the Web UI you want the
# updated sources.yaml to survive restarts. Disabled by default; for
# read-only / GitOps deployments leave off.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

nodeSelector: {}
tolerations: []
affinity: {}

# Liveness / readiness — root-level /healthz and /readyz (k8s convention).
# /healthz returns 200 once the event loop is alive.
# /readyz returns 200 once the HTTP listener is up; sources are runtime-
# configurable so source presence is not a readiness signal.
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

# Optional NetworkPolicy.
# Defaults: ingress from any in-cluster namespace, egress to kube-dns only.
# Override `ingress`/`egress` with full rule lists for stricter posture.
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Vanilla `prometheus.io/*` scrape annotations on the Service. Use when
# the cluster Prometheus uses kubernetes_sd_configs without the
# prometheus-operator. If you DO run the operator, leave this off and
# turn on `serviceMonitor.enabled` instead.
scrapeAnnotations:
  enabled: false
  path: /metrics

# Prometheus Operator ServiceMonitor — only renders if the CRD is installed.
serviceMonitor:
  enabled: false
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []

# Service account token mounting — disable for stricter pods.
automountServiceAccountToken: false

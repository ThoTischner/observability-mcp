apiVersion: v2
name: observability-mcp
description: Unified observability gateway for AI agents — one MCP server for Prometheus, Loki, and any backend
type: application

# Chart version (this chart). Bumped on chart changes.
version: 2.7.0

# App version (the mcp-server image tag the chart defaults to).
# Update with each release of the mcp-server image.
appVersion: "3.7.0"

home: https://github.com/ThoTischner/observability-mcp
sources:
  - https://github.com/ThoTischner/observability-mcp

icon: https://raw.githubusercontent.com/ThoTischner/observability-mcp/main/docs/logo.svg

keywords:
  - mcp
  - model-context-protocol
  - observability
  - prometheus
  - loki
  - sre
  - monitoring
  - ai-agents

maintainers:
  - name: ThoTischner
    url: https://github.com/ThoTischner

annotations:
  # ArtifactHub: https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/ThoTischner/observability-mcp
    - name: Container image
      url: https://github.com/ThoTischner/observability-mcp/pkgs/container/observability-mcp
    - name: npm
      url: https://www.npmjs.com/package/@thotischner/observability-mcp
    - name: Connector Hub
      url: https://thotischner.github.io/observability-mcp/hub/
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/signKey: |
    fingerprint: C240A58EC3B9D596C685FB0079826B0CB9A6329F
    url: https://raw.githubusercontent.com/ThoTischner/observability-mcp/main/docs/helm-signing.pub.asc
  artifacthub.io/images: |
    - name: observability-mcp
      image: ghcr.io/thotischner/observability-mcp:3.7.0
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/changes: |
    - kind: changed
      description: "appVersion → 3.7.0 (optional online RDAP enrich_ips backend); chart points at the 3.7.0 image"
    - kind: added
      description: "enrich_ips optional online RDAP fallback (OFF by default; OMCP_IP_ENRICH_RDAP=on). Offline CSV stays preferred; the air-gapped default is unchanged (#477)"

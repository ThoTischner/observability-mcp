apiVersion: v2
name: observability-mcp
description: Unified observability gateway for AI agents — one MCP server for Prometheus, Loki, and any backend
type: application

# Chart version (this chart). Bumped on chart changes.
version: 0.2.0

# App version (the mcp-server image tag the chart defaults to).
# Update with each release of the mcp-server image.
appVersion: "1.3.4"

home: https://github.com/ThoTischner/observability-mcp
sources:
  - https://github.com/ThoTischner/observability-mcp

icon: https://raw.githubusercontent.com/ThoTischner/observability-mcp/main/docs/logo.png

keywords:
  - mcp
  - model-context-protocol
  - observability
  - prometheus
  - loki
  - sre
  - monitoring
  - ai-agents

maintainers:
  - name: ThoTischner
    url: https://github.com/ThoTischner

annotations:
  # ArtifactHub: https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/ThoTischner/observability-mcp
    - name: Container image
      url: https://github.com/ThoTischner/observability-mcp/pkgs/container/observability-mcp
    - name: npm
      url: https://www.npmjs.com/package/@thotischner/observability-mcp
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/images: |
    - name: observability-mcp
      image: ghcr.io/thotischner/observability-mcp:1.3.4
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/changes: |
    - kind: added
      description: Helm test pod (`helm test <release>`) that probes /readyz on the service
    - kind: added
      description: Optional prometheus.io/scrape annotations on the Service for clusters without prometheus-operator
    - kind: added
      description: NOTES.txt with post-install instructions for accessing UI, configuring sources, and Claude Code wiring
    - kind: added
      description: artifacthub.io/images and artifacthub.io/changes annotations

sources:
  - name: prometheus
    type: prometheus
    url: http://prometheus:9090
    enabled: true
    # metrics:  # Uncomment to override default Prometheus metrics
    #   - name: custom_metric
    #     query: 'my_custom_metric{job="{{service}}"}'
    #     unit: requests
    #     description: My custom metric

  - name: loki
    type: loki
    url: http://loki:3100
    enabled: true

settings:
  checkIntervalMs: 30000
  defaultSensitivity: medium

healthThresholds:
  weights:
    errorRate: 0.35
    latency: 0.25
    cpu: 0.20
    logErrors: 0.20
  cpu:
    good: 50
    warn: 80
    crit: 95
  errorRate:
    good: 0.01
    warn: 0.1
    crit: 0.5
  latencyP99:
    good: 0.5
    warn: 1.0
    crit: 3.0
  logErrors:
    good: 1
    warn: 5
    crit: 20
  statusBoundaries:
    healthy: 80
    degraded: 50
